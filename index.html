<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Hotel Reservation</title>
    <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>
<div class="site-content">
    <!-- Search Form -->
    <div class="search-form-content custom-form">
        <div class="background"><div class="shape"></div><div class="shape"></div></div>
        <form>
            <h3>Search Here</h3>
            <label for="check-in">Check-in:</label>
            <input type="date" id="check-in">
            <label for="check-out">Check-out:</label>
            <input type="date" id="check-out">
            <label for="people">Number of people:</label>
            <input type="number" min="1" id="people">
            <button id="search-form-button">Next</button>
        </form>
    </div>

    <!-- Offers -->
    <div class="search-result-form-content custom-form hidden">
        <div class="background"><div class="shape"></div><div class="shape"></div></div>
        <form>
            <h3>Our Offers</h3>
            <div class="offers">
                <div class="offer-card room-type" data-room="Budget Room – 120 USD">
                    <span>💵 Budget Room – 120 USD</span>
                </div>
                <div class="offer-card room-type" data-room="Family Room – 250 USD">
                    <span>👪 Family Room – 250 USD</span>
                </div>
                <div class="offer-card room-type" data-room="King Room – 500 USD">
                    <span>👑 King Room – 500 USD</span>
                </div>
            </div>
            <div class="buttons">
                <button id="search-back-btn">Back</button>
                <button id="search-next-btn">Next</button>
            </div>
        </form>
    </div>

    <!-- Guest Details -->
    <div class="guest-details-form-content custom-form hidden">
        <div class="background"><div class="shape"></div><div class="shape"></div></div>
        <form>
            <h3>Personal Information</h3>
            <label for="name">Name:</label>
            <input type="text" id="name">
            <label for="phone-number">Phone Number:</label>
            <input type="text" id="phone-number">
            <label for="email">Email:</label>
            <input type="email" id="email">
            <div class="buttons">
                <button id="guest-details-back-btn">Back</button>
                <button id="guest-details-next-btn">Next</button>
            </div>
        </form>
    </div>

    <!-- Confirm Reservation -->
    <div class="confirm-reservation-content custom-form hidden">
        <div class="background"><div class="shape"></div><div class="shape"></div></div>
        <form>
            <h3>Confirm Reservation</h3>
            <div class="confirm-reservation">
                <h4 id="guest-name">Name: ---</h4>
                <h4 id="guest-phone">Phone: ---</h4>
                <h4 id="guest-email">Email: ---</h4>
                <h4 id="guest-room-type">Room: ---</h4>
                <h4 id="guest-data-in">Date-in: ---</h4>
                <h4 id="guest-data-out">Date-out: ---</h4>
            </div>
            <div class="buttons">
                <button id="confirm-back-btn">Back</button>
                <button id="confirm-reservation">Confirm</button>
            </div>
        </form>
    </div>

    <!-- Thank You -->
    <div class="thank-you-content custom-form hidden">
        <div class="background"><div class="shape"></div><div class="shape"></div></div>
        <form>
            <h3>Thank You!</h3>
            <p>Your reservation is confirmed.</p>
            <button id="thankyou-new-reservation">New Reservation</button>
        </form>
    </div>
</div>

<script src="solution.js"></script>
</body>
</html>
